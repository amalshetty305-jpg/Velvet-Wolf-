<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Have You Spotted the Wolf?</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@300;400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .wolf-runner {
      position: fixed;
      top: 50%;
      left: 0;
      z-index: 10;
      pointer-events: none;
      animation: wolfRun 3s ease-in-out forwards;
    }

    .wolf-runner img {
      width: clamp(120px, 22vw, 240px);
      height: auto;
      display: block;
    }

    @keyframes wolfRun {
      0% {
        transform: translate(calc(100vw + 100%), -50%);
        opacity: 1;
      }
      88% {
        opacity: 1;
      }
      100% {
        transform: translate(calc(-100% - 10vw), -50%);
        opacity: 0;
        visibility: hidden;
      }
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-family: 'Cormorant SC', serif;
      font-weight: 300;
      font-size: clamp(1.8rem, 5vw, 4.5rem);
      letter-spacing: 0.18em;
      color: transparent;
      background: linear-gradient(105deg, #7a5a00, #c9970a, #f5c518, #e8b800, #c9970a, #7a5a00);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      white-space: nowrap;
      overflow: hidden;
      border-right: 3px solid #c9970a;
      width: 0;
      visibility: hidden;
      animation:
        showCaption 0s 3.1s forwards,
        typing 4.6s steps(62, end) 3.1s forwards,
        goldShimmer 5s ease-in-out 6.6s infinite,
        blink 0.75s step-end 6.6s 6;
    }

    @keyframes showCaption {
      to { visibility: visible; }
    }

    @keyframes typing {
      from { width: 0; border-right-color: #c9970a; }
      to   { width: 100%; border-right-color: #c9970a; }
    }

    @keyframes blink {
      0%, 100% { border-right-color: #c9970a; }
      50%       { border-right-color: transparent; }
    }

    @keyframes goldShimmer {
      0%   { background-position: 100% 0; }
      50%  { background-position: 0% 0; }
      100% { background-position: 100% 0; }
    }
  </style>
</head>
<body>
  <div class="wolf-runner" aria-hidden="true">
    <img src="wolf-gold.gif" alt="" />
  </div>

  <div class="container">
    <h1>have you spotted the wolf at william square, liverpool yet?</h1>
  </div>
</body>
</html>
