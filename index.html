<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Have You Spotted the Wolf?</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@300;400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #ffffff;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      -webkit-text-size-adjust: 100%;
    }

    .wolf-runner {
      position: fixed;
      top: 50%;
      left: 0;
      z-index: 10;
      pointer-events: none;
      animation: wolfRun 3s ease-in-out forwards;
    }

    .wolf-runner img {
      width: clamp(120px, 22vw, 240px);
      height: auto;
      display: block;
    }

    @keyframes wolfRun {
      0% {
        transform: translate(calc(100vw + 100%), -50%);
        opacity: 1;
      }
      88% {
        opacity: 1;
      }
      100% {
        transform: translate(calc(-100% - 10vw), -50%);
        opacity: 0;
        visibility: hidden;
      }
    }

    .container {
      width: 100%;
      max-width: 100%;
      text-align: center;
      padding: 1.25rem;
      display: flex;
      justify-content: center;
    }

    h1 {
      --caption-chars: 62;
      font-family: 'Cormorant SC', serif;
      font-weight: 300;
      font-size: min(4.5rem, calc((100vw - 2.5rem) / (var(--caption-chars) * 0.62)));
      letter-spacing: 0.12em;
      line-height: 1.35;
      color: transparent;
      background: linear-gradient(105deg, #7a5a00, #c9970a, #f5c518, #e8b800, #c9970a, #7a5a00);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      display: inline-block;
      max-width: calc(100vw - 2.5rem);
      white-space: nowrap;
      overflow: hidden;
      border-right: 3px solid #c9970a;
      width: 0;
      visibility: hidden;
      animation:
        showCaption 0s 3.1s forwards,
        typing 4.6s steps(62, end) 3.1s forwards,
        goldShimmer 5s ease-in-out 6.6s infinite,
        blink 0.75s step-end 6.6s 6;
    }

    @media (max-width: 640px) {
      .wolf-runner img {
        width: clamp(90px, 28vw, 160px);
      }

      .container {
        padding: 1rem 0.85rem;
      }

      h1 {
        font-size: clamp(0.82rem, 3.6vw, 1.15rem);
        letter-spacing: 0.05em;
        line-height: 1.5;
        white-space: normal;
        text-align: center;
        max-width: min(22em, calc(100vw - 1.7rem));
      }

      @keyframes typing {
        from { width: 0; border-right-color: #c9970a; }
        to   { width: min(22em, calc(100vw - 1.7rem)); border-right-color: #c9970a; }
      }
    }

    @keyframes showCaption {
      to { visibility: visible; }
    }

    @keyframes typing {
      from { width: 0; border-right-color: #c9970a; }
      to   { width: 62ch; border-right-color: #c9970a; }
    }

    @keyframes blink {
      0%, 100% { border-right-color: #c9970a; }
      50%       { border-right-color: transparent; }
    }

    @keyframes goldShimmer {
      0%   { background-position: 100% 0; }
      50%  { background-position: 0% 0; }
      100% { background-position: 100% 0; }
    }
  </style>
</head>
<body>
  <div class="wolf-runner" aria-hidden="true">
    <img src="wolf-gold.gif" alt="" />
  </div>

  <div class="container">
    <h1>have you spotted the wolf at william square, liverpool yet?</h1>
  </div>
</body>
</html>
